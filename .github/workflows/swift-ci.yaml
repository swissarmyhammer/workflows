name: Swift CI

on:
  workflow_call:
    inputs:
      developer-dir:
        description: >
          Path to an Xcode.app/Contents/Developer to export as DEVELOPER_DIR
          before building (e.g. for projects that need a beta Xcode with a
          newer Metal toolchain). Leave unset to use the runner's default.
        required: false
        type: string
        default: ""
      integration-gate-env:
        description: >
          Name of an env var to set to 1 to unlock a gated, opt-in
          integration suite that depends on real external resources (models,
          network, GPU). Leave empty to skip the integration job entirely.
          Only runs when the caller's triggering event is workflow_dispatch.
        required: false
        type: string
        default: ""
      integration-xctest-glob:
        description: >
          find(1) -path glob, relative to .build, locating the integration
          suite's .xctest bundle (e.g. '*IntegrationTests.xctest'). Required
          when integration-gate-env is set.
        required: false
        type: string
        default: ""
      integration-metallib-glob:
        description: >
          Optional find(1) -path glob, relative to .build, locating an
          mlx-swift default.metallib to copy next to the xctest bundle
          before running it (e.g. '*Cmlx*/default.metallib'). Works around
          `swift test`/xctest failing to load it under SwiftPM. Leave empty
          if the integration suite doesn't depend on mlx-swift.
        required: false
        type: string
        default: ""
      example-targets:
        description: >
          Whitespace-separated list of additional executable target names to
          build individually via `swift build --target <name>`, on top of the
          whole-package `swift build --build-tests` above (e.g. for a set of
          Examples/ targets whose per-target compilation is itself an
          acceptance criterion). Leave empty to skip.
        required: false
        type: string
        default: ""
      docc-target:
        description: >
          Name of a library target to build a DocC catalog for via
          swift-docc-plugin's `generate-documentation --warnings-as-errors`
          (promotes DocC's own diagnostics — unresolved ``symbol``
          cross-references, malformed directives — to build failures). The
          calling package must declare a dependency on
          `swiftlang/swift-docc-plugin` itself; this workflow only invokes the
          plugin. Leave empty to skip DocC entirely.
        required: false
        type: string
        default: ""
      docc-coverage-script:
        description: >
          Path, relative to the repository root, to a script that enforces
          zero missing-documentation warnings against the report produced by
          `generate-documentation --experimental-documentation-coverage`
          (DocC has no built-in "undocumented symbol" warning class, so
          --warnings-as-errors above has nothing to promote for that case —
          this is the actual enforcement mechanism). Invoked as
          `<script> <coverage-report-path>` and expected to exit non-zero on
          a coverage gap. Only meaningful alongside docc-target; leave empty
          to build DocC without coverage enforcement.
        required: false
        type: string
        default: ""

jobs:
  test:
    name: Build & test
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Configure DEVELOPER_DIR
        if: inputs.developer-dir != ''
        run: echo "DEVELOPER_DIR=${{ inputs.developer-dir }}" >> "$GITHUB_ENV"

      - name: Toolchain versions
        run: |
          sw_vers
          swift --version

      - name: Clean build directory
        run: rm -rf .build

      - name: Build (incl. tests)
        run: swift build --build-tests

      - name: Run tests
        run: swift test

      - name: Build additional example targets
        if: inputs.example-targets != ''
        run: |
          set -euo pipefail
          for target in ${{ inputs.example-targets }}; do
            echo "::group::swift build --target $target"
            swift build --target "$target"
            echo "::endgroup::"
          done

      - name: DocC build
        if: inputs.docc-target != ''
        run: swift package generate-documentation --target ${{ inputs.docc-target }} --warnings-as-errors

      - name: DocC documentation coverage
        if: inputs.docc-target != '' && inputs.docc-coverage-script != ''
        run: |
          set -euo pipefail
          swift package generate-documentation --target ${{ inputs.docc-target }} \
            --experimental-documentation-coverage --coverage-summary-level detailed \
            > docc-coverage.txt
          python3 ${{ inputs.docc-coverage-script }} docc-coverage.txt

  integration:
    name: Integration (opt-in, real dependencies)
    if: inputs.integration-gate-env != '' && github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Configure DEVELOPER_DIR
        if: inputs.developer-dir != ''
        run: echo "DEVELOPER_DIR=${{ inputs.developer-dir }}" >> "$GITHUB_ENV"

      - name: Clean build directory
        run: rm -rf .build

      - name: Build tests
        run: swift build --build-tests

      - name: Run gated integration suite
        run: |
          set -euo pipefail
          XCTEST="$(find .build -path '${{ inputs.integration-xctest-glob }}' -type d | head -n 1)"
          echo "xctest: ${XCTEST:?not found}"

          METALLIB_GLOB='${{ inputs.integration-metallib-glob }}'
          if [ -n "$METALLIB_GLOB" ]; then
            METALLIB="$(find .build -path "$METALLIB_GLOB" | head -n 1)"
            echo "metallib: ${METALLIB:?not found}"
            cp "$METALLIB" "$XCTEST/Contents/MacOS/" 2>/dev/null \
              || cp "$METALLIB" "$(dirname "$XCTEST")/"
          fi

          ${{ inputs.integration-gate-env }}=1 xcrun xctest "$XCTEST"
